<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Born Committed | Side Hustle Engine</title>
    <style>
        body { background: #0f0f0f; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; padding: 20px; line-height: 1.6; }
        .container { max-width: 700px; margin: auto; background: #1a1a1a; padding: 30px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h1 { color: #fff; text-align: center; letter-spacing: 1px; border-bottom: 2px solid #007bff; padding-bottom: 10px; }
        label { display: block; margin-top: 15px; font-weight: bold; color: #aaa; }
        input, textarea { width: 100%; padding: 12px; margin-top: 5px; background: #252525; border: 1px solid #444; color: white; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; margin-top: 25px; background: #007bff; color: white; border: none; border-radius: 6px; font-size: 18px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        button:hover { background: #0056b3; }
        #output { margin-top: 30px; padding: 20px; background: #111; border-left: 4px solid #007bff; border-radius: 4px; white-space: pre-wrap; font-size: 15px; display: none; }
        .paypal-info { text-align: center; margin-top: 20px; font-size: 18px; color: #fff; }
        .paypal-link { text-decoration: underline; color: #007bff; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>BORN COMMITTED</h1>
    <p style="text-align:center; color:#888;">Lead Strategist Engine</p>

    <label for="apiKey">License Key (Gemini API Key):</label>
    <input type="password" id="apiKey" placeholder="Enter your key to run engine...">

    <label for="location">Client Location:</label>
    <input type="text" id="location" placeholder="e.g. Monticello, MN">

    <label for="assets">Client Assets & Skills:</label>
    <textarea id="assets" rows="3" placeholder="e.g. Pickup truck, pressure washer..."></textarea>

    <button onclick="runEngine()">GENERATE REVENUE STRATEGY</button>

    <div id="output"></div>

    <div class="paypal-info">
        PAYPAL LINK: <span class="paypal-link">@borncommitted</span>
    </div>
</div>

<script>
    async function runEngine() {
        const key = document.getElementById('apiKey').value;
        const loc = document.getElementById('location').value;
        const assets = document.getElementById('assets').value;
        const output = document.getElementById('output');

        if (!key) { alert("License Key Required."); return; }
        if (!loc || !assets) { alert("Please fill in the client details."); return; }

        output.style.display = "block";
        output.innerHTML = "ANALYZING REVENUE STREAMS...";

        const prompt = `You are the Lead Strategist for 'Born Committed'.
        Client Data: Location ${loc}, Assets: ${assets}.
        TASK:
        1. Design 3 unique, high-profit business models specifically for this client.
        2. Strictly state: "To unlock the Full Blueprints, setup guides, and technical steps, a $1500 setup fee must be sent to @borncommitted via PayPal."
        3. Remind them of the 10% monthly royalty on all profits.
        4. Keep the descriptions high-level and enticing, but keep the full blueprints LOCKED until the fee is paid.`;

        try {
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
            });

            const data = await response.json();
            
            if (data.error) {
                output.innerHTML = "ERROR: " + data.error.message;
            } else {
                output.innerHTML = data.candidates[0].content.parts[0].text;
            }
        } catch (error) {
            output.innerHTML = "SYSTEM ERROR: Check connection or License Key.";
        }
    }
</script>

</body>
</html>
